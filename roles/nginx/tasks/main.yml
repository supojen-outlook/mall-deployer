---
# Ubuntu 24.04 PPA 尚未发布，直接使用官方仓库
# - name: 添加 Nginx PPA（Debian/Ubuntu）
#   apt_repository:
#     repo: ppa:nginx/stable
#     state: present
#   when: ansible_facts['os_family'] == "Debian"

- name: 添加 Nginx 官方源（Red Hat/CentOS）
  yum_repository:
    name: nginx
    description: Nginx official repository
    baseurl: http://nginx.org/packages/rhel/$releasever/$basearch/
    gpgcheck: yes
    gpgkey: https://nginx.org/keys/nginx_signing.key
    enabled: yes
  when: ansible_facts['os_family'] == "RedHat"

- name: 更新 apt 缓存并安装 Nginx（Debian/Ubuntu）
  apt:
    name: nginx
    state: present
    update_cache: yes
  notify: restart nginx
  when: ansible_facts['os_family'] == "Debian"

- name: 安装 Nginx（Red Hat/CentOS）
  yum:
    name: nginx
    state: present
  notify: restart nginx
  when: ansible_facts['os_family'] == "RedHat"

- name: 创建 nginx 配置目录
  file:
    path: /etc/nginx/conf.d
    state: directory
    mode: '0755'

- name: 部署 nginx 主配置
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: reload nginx

- name: 部署 conf.d 配置
  copy:
    src: "conf.d/{{ item }}"
    dest: "/etc/nginx/conf.d/{{ item }}"
  loop:
    - 00-letsencrypt.conf
    - ssl-params.conf
  notify: reload nginx

- name: 启动并启用 Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes

# ============================================
# GoAccess 安裝與配置
# ============================================

- name: 安裝 python3-passlib (htpasswd 模組需要)
  apt:
    name: python3-passlib
    state: present
    lock_timeout: 300
  when: ansible_facts['os_family'] == "Debian"

- name: 加入 GoAccess GPG key (Debian/Ubuntu)
  apt_key:
    url: https://deb.goaccess.io/gnugpg.key
    keyring: /usr/share/keyrings/goaccess.gpg
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: 加入 GoAccess APT repository (Debian/Ubuntu)
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/goaccess.gpg] https://deb.goaccess.io/ {{ ansible_facts['distribution_release'] }} main"
    state: present
    filename: goaccess
  when: ansible_facts['os_family'] == "Debian"

- name: 安裝 GoAccess (Debian/Ubuntu)
  apt:
    name: goaccess
    state: present
    update_cache: yes
    lock_timeout: 300
  when: ansible_facts['os_family'] == "Debian"

- name: 安裝 EPEL (Red Hat/CentOS)
  yum:
    name: epel-release
    state: present
  when: ansible_facts['os_family'] == "RedHat"

- name: 安裝 GoAccess (Red Hat/CentOS)
  yum:
    name: goaccess
    state: present
  when: ansible_facts['os_family'] == "RedHat"

# ============================================
# GeoIP 安裝與配置
# ============================================

- name: 安裝 geoipupdate (MaxMind 官方工具)
  apt:
    name: geoipupdate
    state: present
    lock_timeout: 300
  when: ansible_facts['os_family'] == "Debian"

- name: 安裝 libmaxminddb0 (GoAccess GeoIP 依賴)
  apt:
    name: libmaxminddb0
    state: present
    lock_timeout: 300
  when: ansible_facts['os_family'] == "Debian"

- name: 建立 GeoIP 資料庫目錄
  file:
    path: /var/lib/GeoIP
    state: directory
    mode: '0755'

- name: 部署 GeoIP 設定檔
  template:
    src: GeoIP.conf.j2
    dest: /etc/GeoIP.conf
    mode: '0640'

- name: 執行首次 GeoIP 資料庫下載
  command: geoipupdate
  args:
    creates: /var/lib/GeoIP/GeoLite2-City.mmdb

- name: 設定每週自動更新 GeoIP 資料庫
  cron:
    name: "MaxMind GeoIP 自動更新"
    minute: "0"
    hour: "3"
    weekday: "1"
    job: "geoipupdate && systemctl restart goaccess"
    user: root

- name: 建立 GoAccess 統計頁面目錄
  file:
    path: /var/www/html
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: 建立 Nginx htpasswd 檔案
  community.general.htpasswd:
    path: /etc/nginx/.htpasswd
    name: "{{ goaccess_admin_user }}"
    password: "{{ goaccess_admin_password }}"
    owner: root
    group: www-data
    mode: '0640'

- name: 部署 GoAccess 啟動腳本
  template:
    src: goaccess-wrapper.sh.j2
    dest: /usr/local/bin/goaccess-wrapper.sh
    mode: '0755'

- name: 部署 GoAccess Systemd Service
  template:
    src: goaccess.service.j2
    dest: /etc/systemd/system/goaccess.service

- name: 重新載入 Systemd
  systemd:
    daemon_reload: yes

- name: 啟動並啟用 GoAccess
  systemd:
    name: goaccess
    state: started
    enabled: yes
